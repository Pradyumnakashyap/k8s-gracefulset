apiVersion: apps.gracefulset.io/v1alpha1
kind: GracefulSet
metadata:
  name: my-app
  namespace: default
spec:
  replicas: 3
  version: "2024.1.0"
  drainPolicy:
    mode: WaitForCompletion
    maxDrainingPods: 10
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
        gracefulset.io/name: my-app
    spec:
      containers:
        - name: app
          image: my-registry/my-app:2024.1.0
          ports:
            - containerPort: 10080
              name: metrics
          env:
            - name: APP_VERSION
              value: "2024.1.0"
          resources:
            requests:
              cpu: "4"
              memory: 18Gi
